<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – DeepGuard</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        body { justify-content: flex-start; padding-top: 0; }

        .bg-grid {
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(0,176,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,176,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        .auth-wrap { position: relative; z-index: 1; }

        .login-err {
            background: rgba(255,77,109,0.1);
            border: 1px solid rgba(255,77,109,0.35);
            color: #ff4d6d;
            font-family: 'Courier New', monospace;
            font-size: 0.72rem; letter-spacing: 0.06em;
            padding: 0.7rem 1rem; border-radius: 6px;
            margin-bottom: 1.2rem; display: none;
        }
        .login-err.show { display: block; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <div class="auth-wrap">
        <a class="auth-logo" href="landing.html">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <defs><linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs>
                <path stroke="url(#ng)" d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path stroke="url(#ng)" d="M2 17l10 5 10-5"/>
                <path stroke="url(#ng)" d="M2 12l10 5 10-5"/>
            </svg>
            <span class="auth-logo-text">DEEPFAKE DETECTION SYSTEM</span>
        </a>

        <div class="auth-card">
            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-sub">SIGN IN TO CONTINUE TO DEEPGUARD</p>

            <div class="login-err" id="loginErr">Invalid username / email or password.</div>

            <div class="field">
                <label>Username or Email</label>
                <input type="text" id="loginId" placeholder="Username or email address" autocomplete="off"/>
                <div class="field-error" id="errLoginId">This field is required.</div>
            </div>

            <div class="field">
                <label>Password</label>
                <input type="password" id="loginPwd" placeholder="Your password"/>
                <div class="field-error" id="errLoginPwd">Password is required.</div>
            </div>

            <button class="btn-submit" id="btnLogin">SIGN IN →</button>
        </div>

        <div class="auth-switch">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
    </div>

    <script>
        // Allow pressing Enter to submit
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('btnLogin').click();
        });

        document.getElementById('btnLogin').addEventListener('click', function() {
            var loginId = document.getElementById('loginId').value.trim();
            var pwd     = document.getElementById('loginPwd').value;
            var valid   = true;

            document.getElementById('errLoginId').classList.remove('show');
            document.getElementById('errLoginPwd').classList.remove('show');
            document.getElementById('loginErr').classList.remove('show');

            if (!loginId) {
                document.getElementById('errLoginId').classList.add('show'); valid = false;
            }
            if (!pwd) {
                document.getElementById('errLoginPwd').classList.add('show'); valid = false;
            }
            if (!valid) return;

            // Check against saved users
            var users = JSON.parse(localStorage.getItem('dg_users') || '[]');
            var user  = users.find(function(u) {
                return (u.username === loginId || u.email === loginId) && u.password === pwd;
            });

            if (!user) {
                document.getElementById('loginErr').classList.add('show');
                return;
            }

            // Save logged-in user session
            localStorage.setItem('dg_session', JSON.stringify({ username: user.username, email: user.email }));
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
